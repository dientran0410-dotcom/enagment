server:
  port: 8085

spring:
  datasource:
    url: jdbc:mysql://localhost:3308/engagement_service_db
    username: engagement_user
    password: engagement_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

  springdoc:
    api-docs:
      path: /v3/api-docs
    swagger-ui:
      path: /swagger-ui.html
